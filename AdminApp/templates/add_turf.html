{% extends 'base_dashboard.html' %}
{% block content %}

<div class="card card-primary">
    <div class="card-header">
        <h3 class="card-title">Add Turf</h3>
    </div>

    <form method="post" action="{% url 'add_turf' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-body">

            <div class="form-group">
                <label>Turf Name</label>
                <input type="text" class="form-control" name="turf_name" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" class="form-control" name="location" required>
            </div>
            <div class="form-group">
                <label>Select Sports</label>

                <select class="form-control" name="sports" multiple required>

                    {% for sport in sports %}

                    <option value="{{ sport.id }}">
                        {{ sport.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group">
                <label>Turf Type</label>
                <input type="text" class="form-control" name="turf_type">
            </div>

            <div class="form-group">
                <label>Price Per Hour</label>
                <input type="number" class="form-control" name="price" required>
            </div>

            <div class="form-group">
                <label>Opening Time</label>
                <input type="time" class="form-control" name="opening_time">
            </div>

            <div class="form-group">
                <label>Closing Time</label>
                <input type="time" class="form-control" name="closing_time">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control" rows="4" name="description"></textarea>
            </div>

            <div class="form-group">
                <label>Turf Image</label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" name="turf_image">
                    <label class="custom-file-label">Choose file</label>
                </div>
            </div>

        </div>

        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Add Turf</button>
        </div>
    </form>
</div>

{% endblock %}
