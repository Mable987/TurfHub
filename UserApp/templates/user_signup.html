<!doctype html>
{% load static %}
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'login/css/bootstrap.min.css' %}">

<title>TurfHub Signup</title>

<style>

body{
font-family:'Roboto', sans-serif;
height:100vh;
margin:0;

/* background image */
background:url("{% static 'login/images/bg_1.jpg' %}") no-repeat center center/cover;

display:flex;
align-items:center;
justify-content:center;
}

/* dark overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* signup card */
.signup-card{
width:420px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* heading */
.signup-card h3{
text-align:center;
margin-bottom:25px;
}

/* button */
.btn-primary{
background:#12b76a;
border:none;
padding:12px;
font-weight:500;
}

.btn-primary:hover{
background:#0ea75c;
}

</style>

</head>

<body>

<div class="signup-card">

<h3>Create <strong>TurfHub Account</strong></h3>

<form method="POST">
{% csrf_token %}

<div class="form-group mb-3">
<label>Name</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="form-group mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="form-group mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="form-group mb-3">
<label>Confirm Password</label>
<input type="password" name="confirm_password" class="form-control" required>
</div>

<input type="submit" value="Sign Up" class="btn btn-primary w-100">

<div class="mt-3 text-center">
Already have an account?
<a href="{% url 'user_login' %}">Login</a>
</div>

</form>

</div>

<script src="{% static 'login/js/bootstrap.min.js' %}"></script>

</body>
</html>
