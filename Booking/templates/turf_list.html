<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Available Turfs</h1>

    {% for turf in turfs %}
    <div>
        <h2>{{ turf.name }}</h2>
        <p>Location: {{ turf.location }}</p>
        <p>Price per hour: ₹{{ turf.price_per_hour }}</p>
        <p>{{ turf.description }}</p>
        <hr>
    </div>
    {% endfor %}
</body>

</html>
